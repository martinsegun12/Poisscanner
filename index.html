<!DOCTYPE html>
<html>
<head>
  <title>POI Scanner</title>
</head>
<body>
  <h1>POI Scanner Engine</h1>

  <button onclick="runScanner()">Run Scan</button>

  <pre id="output"></pre>

  <script src="scanner.js"></script>

  <script>
    function runScanner() {
      // Example dummy candles (replace later with API data)
      let candles = [
        { open: 1, high: 2, low: 0.5, close: 1.8 },
        { open: 1.8, high: 2.2, low: 1.7, close: 2.1 },
        { open: 2.1, high: 2.5, low: 2.0, close: 2.4 },
      ];

      let engine = new POIEngine(candles);
      let result = engine.run();

      document.getElementById("output").textContent =
        JSON.stringify(result, null, 2);
    }
  </script>
</body>
</html>
